name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: "none"

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  e2e:
    uses: ./.github/workflows/e2e.yml

  build-and-publish:
    needs: [ci, e2e]
    runs-on: ubuntu-latest
    env:
      # Only publish to Docker Hub when the credentials secret is configured.
      # Deferred decision (Docker Hub vs Codeberg registry vs drop) tracked separately.
      DOCKER_PUBLISH: ${{ secrets.DOCKER_USERNAME != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so the fast-forward push to the Codeberg mirror can be
          # verified. With the default shallow clone (depth 1) the runner lacks
          # the commit Codeberg's main points to whenever GitHub main is more
          # than one commit ahead, and the push is rejected as non-fast-forward.
          fetch-depth: 0

      - name: Build project artifacts
        uses: ./.github/actions/build-sharkord
        with:
          bump: ${{ inputs.bump }}

      - name: Get new version
        id: get_version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Identify user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and publish Docker image
        if: ${{ env.DOCKER_PUBLISH == 'true' }}
        uses: ./.github/actions/docker-build-publish
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sharkord:latest
            ${{ secrets.DOCKER_USERNAME }}/sharkord:v${{ steps.get_version.outputs.version }}
          labels: |
            org.opencontainers.image.title=Sharkord
            org.opencontainers.image.description=Sharkord Server
            org.opencontainers.image.version=${{ steps.get_version.outputs.version }}
            org.opencontainers.image.source=https://github.com/Sharkord/sharkord

      - name: Commit version bump
        if: ${{ inputs.bump != 'none' }}
        run: |
          git add .
          git commit -m "chore: bump version to ${{ steps.get_version.outputs.version }}"

      - name: Tag and push to both remotes
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.version }}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD --follow-tags
          CB_URL="https://The_Neckript:${CODEBERG_TOKEN}@codeberg.org/The_Neckript/bullshark.git"
          git remote add codeberg "$CB_URL" || git remote set-url codeberg "$CB_URL"
          git push codeberg "HEAD:refs/heads/${{ github.ref_name }}"
          git push codeberg "v${VERSION}"

      - name: Create Codeberg release and upload assets
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.version }}"
          API="https://codeberg.org/api/v1/repos/The_Neckript/bullshark"
          OUT="apps/server/build/out"

          # --- Create the release (verbose on failure, idempotent on re-run) ---
          resp="$(curl -sS -w $'\n%{http_code}' -X POST "${API}/releases" \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"v${VERSION}\",\"name\":\"v${VERSION}\",\"draft\":false,\"prerelease\":false}")"
          code="${resp##*$'\n'}"
          body="${resp%$'\n'*}"
          echo "Create release -> HTTP ${code}"

          case "$code" in
            201) RELEASE_ID="$(printf '%s' "$body" | jq -r '.id')" ;;
            409)
              echo "Release for v${VERSION} already exists; reusing it."
              RELEASE_ID="$(curl -sS -H "Authorization: token ${CODEBERG_TOKEN}" \
                "${API}/releases/tags/v${VERSION}" | jq -r '.id')" ;;
            *)
              echo "::error::Codeberg release creation failed (HTTP ${code})"
              echo "Response body: ${body}"
              exit 1 ;;
          esac

          if [ -z "${RELEASE_ID}" ] || [ "${RELEASE_ID}" = "null" ]; then
            echo "::error::Could not determine RELEASE_ID (body: ${body})"; exit 1
          fi
          echo "RELEASE_ID=${RELEASE_ID}"

          # --- Upload assets ---
          for f in bullshark-linux-x64 bullshark-linux-arm64 release.json; do
            if [ ! -f "${OUT}/${f}" ]; then
              echo "::error::Missing artifact ${OUT}/${f}"; ls -la "${OUT}" || true; exit 1
            fi
            echo "Uploading ${f}..."
            curl -sS --fail-with-body -X POST "${API}/releases/${RELEASE_ID}/assets?name=${f}" \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -F "attachment=@${OUT}/${f}"
            echo
          done
          echo "Codeberg release v${VERSION} published."
